version: '3.8'

services:
  kcd2-calculator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kcd2-calculator
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5000
    restart: unless-stopped
    volumes:
      # Optional: mount for development (comment out for production)
      - ./kcd2Calculator:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
